<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Magento B2B role permissions</title><desc id="desc">A permission matrix comparing read-only and modify access for company contacts.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#172554"/><stop offset="1" stop-color="#2563eb"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity=".3"/></filter></defs>
  <rect width="1200" height="720" rx="44" fill="url(#bg)"/><circle cx="1120" cy="0" r="280" fill="#93c5fd" opacity=".16"/>
  <text x="72" y="86" fill="#bfdbfe" font-family="Arial" font-size="24" font-weight="700" letter-spacing="3">MAGENTO 2 · B2B</text><text x="72" y="140" fill="#fff" font-family="Arial" font-size="42" font-weight="700">Company role permissions</text>
  <g filter="url(#s)"><rect x="72" y="188" width="1056" height="458" rx="28" fill="#f8fafc"/></g>
  <g font-family="Arial"><rect x="116" y="240" width="968" height="70" rx="16" fill="#dbeafe"/><text x="152" y="284" fill="#1e3a8a" font-size="20" font-weight="700">CAPABILITY</text><text x="690" y="284" fill="#1e3a8a" font-size="20" font-weight="700">READ ONLY</text><text x="906" y="284" fill="#1e3a8a" font-size="20" font-weight="700">MODIFY</text>
  <g fill="#fff" stroke="#e2e8f0"><rect x="116" y="326" width="968" height="62" rx="12"/><rect x="116" y="400" width="968" height="62" rx="12"/><rect x="116" y="474" width="968" height="62" rx="12"/><rect x="116" y="548" width="968" height="62" rx="12"/></g>
  <g fill="#334155" font-size="19"><text x="152" y="365">View products and pricing</text><text x="152" y="439">Modify cart</text><text x="152" y="513">View company orders</text><text x="152" y="587">Place orders</text></g>
