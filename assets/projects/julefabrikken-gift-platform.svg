<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Julefabrikken multi-store gift platform</title>
  <desc id="desc">A visual showing manager, leader and employee gift workflows connected to Magento modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1739"/><stop offset="1" stop-color="#2148a6"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff" stop-opacity=".98"/><stop offset="1" stop-color="#dbeafe" stop-opacity=".92"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="1090" cy="82" r="170" fill="#3b82f6" opacity=".16"/><circle cx="80" cy="670" r="230" fill="#7dd3fc" opacity=".1"/>
  <text x="72" y="88" fill="#93c5fd" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">MAGENTO 2 · MULTI-STORE</text>
  <text x="72" y="142" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="700">Gift platform workflows</text>
  <g filter="url(#shadow)">
    <rect x="72" y="190" width="1056" height="450" rx="28" fill="url(#card)"/>
    <rect x="72" y="190" width="1056" height="70" rx="28" fill="#ffffff"/><rect x="72" y="234" width="1056" height="26" fill="#ffffff"/>
    <circle cx="112" cy="224" r="9" fill="#fb7185"/><circle cx="142" cy="224" r="9" fill="#fbbf24"/><circle cx="172" cy="224" r="9" fill="#34d399"/>
    <text x="220" y="232" fill="#64748b" font-family="Arial, sans-serif" font-size="20">gift-platform.local / role-flow</text>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="120" y="310" width="230" height="108" rx="18" fill="#0f172a"/><text x="154" y="352" fill="#93c5fd" font-size="20" font-weight="700">MANAGER</text><text x="154" y="385" fill="#ffffff" font-size="17">Configure teams</text>
    <rect x="485" y="310" width="230" height="108" rx="18" fill="#1d4ed8"/><text x="519" y="352" fill="#dbeafe" font-size="20" font-weight="700">LEADER</text><text x="519" y="385" fill="#ffffff" font-size="17">Assign selections</text>
    <rect x="850" y="310" width="230" height="108" rx="18" fill="#0f766e"/><text x="884" y="352" fill="#ccfbf1" font-size="20" font-weight="700">EMPLOYEE</text><text x="884" y="385" fill="#ffffff" font-size="17">Choose a gift</text>
    <path d="M350 364h115" stroke="#64748b" stroke-width="5" stroke-linecap="round"/><path d="m448 348 17 16-17 16" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M715 364h115" stroke="#64748b" stroke-width="5" stroke-linecap="round"/><path d="m813 348 17 16-17 16" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="120" y="480" width="300" height="102" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/><text x="146" y="518" fill="#1e3a8a" font-size="18" font-weight="700">PandiWeb_LoginSystem</text><text x="146" y="549" fill="#475569" font-size="16">Unit login · redirects · roles</text>
    <rect x="450" y="480" width="300" height="102" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/><text x="476" y="518" fill="#3730a3" font-size="18" font-weight="700">PandiWeb_GiftManager</text><text x="476" y="549" fill="#475569" font-size="16">Selection · wishlist · notify</text>
    <rect x="780" y="480" width="300" height="102" rx="16" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2"/><text x="806" y="518" fill="#065f46" font-size="18" font-weight="700">Customer OTP</text><text x="806" y="549" fill="#475569" font-size="16">Verification · secure access</text>
  </g>
</svg>
